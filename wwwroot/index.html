<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TELEVISORES</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>TELEVISORES</h1>

    <input id="sku" placeholder="SKU">
    <input id="nombre" placeholder="Nombre">
    <input id="precio" type="number" placeholder="Precio">
    <input id="stock" type="number" placeholder="Stock">

    <select id="marca"></select>
    <select id="subFamilia"></select>

    <button onclick="agregarProducto()">Agregar</button>

    <div id="productos"></div>

    <div id="modalEliminar" class="modal">
        <div class="modal-contenido">
            <h2>Confirmar eliminación</h2>
            <p>¿Seguro que querés eliminar este producto?</p>
            <div class="modal-botones">
                <button class="btn-si" onclick="confirmarEliminar()">SI</button>
                <button class="btn-no" onclick="cerrarModal()">NO</button>
            </div>
        </div>
    </div>
    <div id="modalMensaje" class="modal">
        <div class="modal-contenido">
            <div class="icono-warning">⚠️</div>
            <p id="textoMensaje"></p>
            <button class="btn-no" onclick="cerrarMensaje()">Aceptar</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
